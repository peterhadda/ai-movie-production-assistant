version: "3.9"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: movieadmin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yourpassword}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      args:
        # Browser calls the backend directly — use the host-mapped port
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5001:5000"
    env_file:
      - ./backend/.env        # provides AWS_* and MLFLOW_ARTIFACT_ROOT
    depends_on:
      - db
    command: >
      sh -c "pip install boto3 -q &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root $${MLFLOW_ARTIFACT_ROOT}"
    volumes:
      - mlflow_data:/mlflow

  # airflow — to be added in Week 7

volumes:
  postgres_data:
  mlflow_data:
